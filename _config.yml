title: DailyBlogs
description: A general-topic blog on cloud, AI, and engineering — one build a day.
author: naveenneog
baseurl: "/DailyBlogs"
url: "https://naveenneog.github.io"
permalink: /:year/:month/:day/:title/

nav_links:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Side Quest
    url: /sidequest/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
